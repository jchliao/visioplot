name: Publish to PyPI

on:
  push:
    tags:
      - "v*" # 当推送形如 v1.0.0 的 tag 时触发

jobs:
  build-n-publish:
    runs-on: ubuntu-latest
    # 关键：必须配置 permissions 才能使用可信发布者功能
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
